services:
  postgres:
    image: postgres:16-alpine
    container_name: umwelt_postgres
    environment:
      POSTGRES_DB: umwelt
      POSTGRES_USER: umwelt
      POSTGRES_PASSWORD: umwelt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umwelt -d umwelt"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./api
    container_name: umwelt_api
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://umwelt:umwelt@postgres:5432/umwelt
      JWT_SECRET: change-me-in-production
      AUTH_DEMO_PASSWORD: demo123
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_BYTES: 10485760
      PROOF_UPLOAD_RATE_LIMIT_WINDOW_SEC: 60
      PROOF_UPLOAD_RATE_LIMIT_MAX: 10
      ALLOWED_MIME_TYPES: image/jpeg,image/png,image/webp
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - api_uploads:/app/uploads

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: http://localhost:8080
    container_name: umwelt_web
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  postgres_data:
  api_uploads:
