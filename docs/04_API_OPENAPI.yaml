openapi: 3.0.3
info:
  title: Umwelt-Compliance Micro-Services API
  version: "0.1"
servers:
  - url: http://localhost:8080
paths:
  /auth/login:
    post:
      summary: Login (email/password oder magic link placeholder)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
              required: [email, password]
      responses:
        "200":
          description: token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
  /projects:
    get:
      summary: List projects
      responses:
        "200":
          description: project list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Project' }
    post:
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectCreate' }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
  /admin/metrics:
    get:
      summary: KPI snapshot for pilot monitoring (admin)
      responses:
        "200":
          description: metrics
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminMetrics' }
  /admin/users:
    get:
      summary: List users (admin)
      responses:
        "200":
          description: user list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AdminUser' }
    post:
      summary: Create user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminUserCreate' }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminUser' }
  /admin/users/{userId}/role:
    patch:
      summary: Update role for existing user (admin)
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string, enum: [ADMIN, REQUESTER, WORKER, QA] }
              required: [role]
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminUser' }
  /templates:
    get:
      summary: List ticket templates
      responses:
        "200":
          description: template list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TicketTemplate' }
    post:
      summary: Create ticket template (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TicketTemplateCreate' }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TicketTemplate' }
  /templates/{templateId}:
    patch:
      summary: Update ticket template (admin)
      parameters:
        - in: path
          name: templateId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TicketTemplateUpdate' }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TicketTemplate' }
    delete:
      summary: Delete ticket template (admin)
      parameters:
        - in: path
          name: templateId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: deleted
  /tickets:
    get:
      summary: List tickets (filters)
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: project_id
          schema: { type: string, format: uuid }
        - in: query
          name: near_lat
          schema: { type: number }
        - in: query
          name: near_lng
          schema: { type: number }
        - in: query
          name: near_radius_km
          schema: { type: number, default: 10 }
      responses:
        "200":
          description: ticket list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Ticket' }
    post:
      summary: Create ticket
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TicketCreate' }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ticket' }
  /tickets/{ticketId}:
    get:
      summary: Get ticket detail
      parameters:
        - in: path
          name: ticketId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TicketDetail' }
  /tickets/{ticketId}/qualify:
    post:
      summary: QA qualify ticket (NEW->QUALIFIED)
      parameters:
        - in: path
          name: ticketId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                task_class: { type: integer, enum: [1,2,3] }
                proof_policy_json: { type: object }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ticket' }
  /tickets/{ticketId}/publish:
    post:
      summary: Publish ticket (QUALIFIED->PUBLISHED)
      parameters:
        - in: path
          name: ticketId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ticket' }
  /tickets/{ticketId}/accept:
    post:
      summary: Worker accepts ticket (PUBLISHED->ACCEPTED)
      parameters:
        - in: path
          name: ticketId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ticket' }
  /tickets/{ticketId}/proofs:
    post:
      summary: Submit proof for ticket (ACCEPTED, NEEDS_CHANGES, or additional proof while PROOF_SUBMITTED)
      parameters:
        - in: path
          name: ticketId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                notes: { type: string }
                checklist_answers_json:
                  type: string
                  description: JSON string
                gps_lat: { type: number }
                gps_lng: { type: number }
                captured_at: { type: string, format: date-time }
                files:
                  type: array
                  items:
                    type: string
                    format: binary
              required: [files, checklist_answers_json]
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Proof' }
  /proofs/{proofId}/qa:
    post:
      summary: QA decision for proof
      parameters:
        - in: path
          name: proofId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                decision: { type: string, enum: [APPROVE, REQUEST_CHANGES, REJECT, ESCALATE] }
                comment: { type: string }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Proof' }
  /proofs/{proofId}/files/{fileId}:
    get:
      summary: Stream proof image file for QA review
      parameters:
        - in: path
          name: proofId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: fileId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: binary image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
  /qa/queue:
    get:
      summary: QA queue of pending proofs with optional validation-flag filters
      parameters:
        - in: query
          name: flag
          schema:
            type: string
            enum: [all, geo_fail, time_fail, exif_missing]
      responses:
        "200":
          description: qa queue
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/QaQueueEntry' }
  /tickets/{ticketId}/report.pdf:
    get:
      summary: Download ticket report PDF
      parameters:
        - in: path
          name: ticketId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: pdf
          content:
            application/pdf:
              schema:
                type: string
                format: binary
  /reports/project.pdf:
    get:
      summary: Download project report PDF
      parameters:
        - in: query
          name: project_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: pdf
          content:
            application/pdf:
              schema:
                type: string
                format: binary

components:
  schemas:
    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        owner_user_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
    ProjectCreate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
      required: [name]
    Ticket:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        category: { type: string }
        task_class: { type: integer }
        status: { type: string }
        location_lat: { type: number }
        location_lng: { type: number }
        geofence_radius_m: { type: integer }
        deadline_at: { type: string, format: date-time }
        accepted_by_user_id: { type: string, format: uuid, nullable: true }
    TicketCreate:
      type: object
      properties:
        project_id: { type: string, format: uuid, nullable: true }
        template_id: { type: string, format: uuid, nullable: true }
        title: { type: string }
        description: { type: string }
        category: { type: string, nullable: true }
        task_class: { type: integer, enum: [1,2,3], nullable: true }
        location_lat: { type: number }
        location_lng: { type: number }
        geofence_radius_m: { type: integer, nullable: true }
        time_window_start: { type: string, format: date-time, nullable: true }
        time_window_end: { type: string, format: date-time, nullable: true }
        deadline_at: { type: string, format: date-time }
        proof_policy_json: { type: object, nullable: true }
        safety_flags_json: { type: object }
      required: [title, location_lat, location_lng, deadline_at]
    TicketTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        category: { type: string }
        task_class: { type: integer, enum: [1,2,3] }
        checklist_json: { type: object }
        proof_policy_json: { type: object }
        default_geofence_radius_m: { type: integer }
        created_at: { type: string, format: date-time }
    TicketTemplateCreate:
      type: object
      properties:
        name: { type: string }
        category: { type: string }
        task_class: { type: integer, enum: [1,2,3] }
        checklist_json: { type: object }
        proof_policy_json: { type: object }
        default_geofence_radius_m: { type: integer }
      required: [name, category, task_class]
    TicketTemplateUpdate:
      type: object
      properties:
        name: { type: string }
        category: { type: string }
        task_class: { type: integer, enum: [1,2,3] }
        checklist_json: { type: object }
        proof_policy_json: { type: object }
        default_geofence_radius_m: { type: integer }
    TicketDetail:
      allOf:
        - $ref: '#/components/schemas/Ticket'
        - type: object
          properties:
            description: { type: string }
            proof_policy_json: { type: object }
            safety_flags_json: { type: object }
            proofs:
              type: array
              items: { $ref: '#/components/schemas/Proof' }
    Proof:
      type: object
      properties:
        id: { type: string, format: uuid }
        ticket_id: { type: string, format: uuid }
        submitted_by_user_id: { type: string, format: uuid }
        submitted_at: { type: string, format: date-time }
        gps_lat: { type: number, nullable: true }
        gps_lng: { type: number, nullable: true }
        captured_at: { type: string, format: date-time, nullable: true }
        validation_flags_json: { type: object }
        checklist_answers_json: { type: object }
        notes: { type: string }
        qa_status: { type: string }
        files:
          type: array
          items: { $ref: '#/components/schemas/ProofFile' }
    ProofFile:
      type: object
      properties:
        id: { type: string, format: uuid }
        file_key: { type: string }
        file_mime: { type: string }
        file_size: { type: integer }
        sha256: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
    AdminMetrics:
      type: object
      properties:
        generated_at: { type: string, format: date-time }
        totals:
          type: object
          properties:
            tickets: { type: integer }
            proofs: { type: integer }
            qa_decided_proofs: { type: integer }
        kpis:
          type: object
          properties:
            median_ticket_to_accepted_seconds: { type: number, nullable: true }
            first_pass_proof_complete_rate: { type: number, nullable: true }
            avg_qa_cycle_seconds: { type: number, nullable: true }
            change_request_rate: { type: number, nullable: true }
    AdminUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        display_name: { type: string, nullable: true }
        role: { type: string, enum: [ADMIN, REQUESTER, WORKER, QA] }
        is_verified: { type: boolean }
        created_at: { type: string, format: date-time }
    AdminUserCreate:
      type: object
      properties:
        email: { type: string }
        display_name: { type: string }
        role: { type: string, enum: [ADMIN, REQUESTER, WORKER, QA] }
        is_verified: { type: boolean, default: true }
      required: [email, role]
    QaQueueEntry:
      type: object
      properties:
        proof_id: { type: string, format: uuid }
        ticket_id: { type: string, format: uuid }
        ticket_title: { type: string }
        category: { type: string }
        submitted_by_user_id: { type: string, format: uuid }
        submitted_at: { type: string, format: date-time }
        validation_flags_json: { type: object }
        qa_status: { type: string }
